services:
  - type: web
    name: healthy-you-staging-backend
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run backend:build
    startCommand: npm run backend:start
    healthCheckPath: /health
    autoDeployTrigger: off
    disk:
      name: healthy-you-staging-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/healthy-you-staging.sqlite
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 30d
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
